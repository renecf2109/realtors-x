name: Supabase Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations to production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error title=Missing Supabase secret::SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, and SUPABASE_PROJECT_REF must all be configured."
            exit 1
          fi

      - name: Show safe migration diagnostics
        shell: bash
        run: |
          echo "Supabase CLI version: $(supabase --version)"
          echo "Project ref: $SUPABASE_PROJECT_REF"
          echo "Migration files found:"
          find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Preview pending migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD" --dry-run

      - name: Apply pending migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
